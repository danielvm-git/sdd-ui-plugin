name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm install

      - name: Smoke CLI help
        run: node packages/cli/src/index.js help

      - name: Doctor check
        run: node packages/cli/src/index.js doctor all --target-dir .

