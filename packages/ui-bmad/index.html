<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMAD UI</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #0b1020; color: #f8fafc; margin: 0; }
    header { padding: 24px; border-bottom: 1px solid #1f2937; }
    main { padding: 24px; display: grid; gap: 16px; }
    .card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 16px; }
    .pillars { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    h1, h2, h3 { margin: 0 0 8px; }
    ul { margin: 0; padding-left: 20px; }
  </style>
</head>
<body>
  <header>
    <h1>BMAD UI</h1>
    <p>Visual overview for BMAD method skills and agents.</p>
  </header>
  <main>
    <section class="card"><h2>Stats</h2><pre id="stats">Loading...</pre></section>
    <section class="card">
      <h2>Skill Matrix</h2>
      <div id="skills" class="pillars"></div>
    </section>
    <section class="card"><h2>Agents</h2><ul id="agents"></ul></section>
  </main>
  <script>
    const API_BASE = window.SDD_UI_API_BASE || "http://127.0.0.1:3007/api";
    const asJson = (path) => fetch(`${API_BASE}${path}`).then((r) => r.json());
    async function render() {
      const [stats, skills, agents] = await Promise.all([
        asJson("/stats"), asJson("/skills"), asJson("/agents")
      ]);
      document.getElementById("stats").textContent = JSON.stringify(stats, null, 2);
      const skillEl = document.getElementById("skills");
      skillEl.innerHTML = Object.entries(skills).map(([pillar, items]) => `
        <div><h3>${pillar}</h3><ul>${items.map((it) => `<li>${it.name}</li>`).join("") || "<li>None</li>"}</ul></div>
      `).join("");
      document.getElementById("agents").innerHTML = agents.map((a) => `<li><strong>${a.name}</strong> - ${a.role}</li>`).join("");
    }
    render().catch((e) => {
      document.getElementById("stats").textContent = `Failed to load API: ${e.message}`;
    });
  </script>
</body>
</html>
