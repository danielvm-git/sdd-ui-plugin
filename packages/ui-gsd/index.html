<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GSD UI</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #09090b; color: #f8fafc; margin: 0; }
    header { padding: 24px; border-bottom: 1px solid #27272a; }
    main { padding: 24px; display: grid; gap: 16px; }
    .card { background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 16px; }
    ul { margin: 0; padding-left: 20px; }
    pre { white-space: pre-wrap; }
  </style>
</head>
<body>
  <header>
    <h1>GSD UI</h1>
    <p>Roadmap, phases, and state for Get Shit Done projects.</p>
  </header>
  <main>
    <section class="card"><h2>Stats</h2><pre id="stats">Loading...</pre></section>
    <section class="card"><h2>Roadmap</h2><ul id="roadmap"></ul></section>
    <section class="card"><h2>Phases</h2><ul id="phases"></ul></section>
    <section class="card"><h2>State</h2><pre id="state"></pre></section>
  </main>
  <script>
    const API_BASE = window.SDD_UI_API_BASE || "http://127.0.0.1:3006/api";
    const asJson = (path) => fetch(`${API_BASE}${path}`).then((r) => r.json());
    async function render() {
      const [stats, roadmap, phases, state] = await Promise.all([
        asJson("/stats"), asJson("/roadmap"), asJson("/phases"), asJson("/state")
      ]);
      document.getElementById("stats").textContent = JSON.stringify(stats, null, 2);
      document.getElementById("roadmap").innerHTML = roadmap.map((p) => `<li>Phase ${p.number}: ${p.title}</li>`).join("") || "<li>No roadmap phases.</li>";
      document.getElementById("phases").innerHTML = phases.map((p) => `<li>${p.id}</li>`).join("") || "<li>No phase files.</li>";
      document.getElementById("state").textContent = state.content || "No STATE.md found.";
    }
    render().catch((e) => {
      document.getElementById("stats").textContent = `Failed to load API: ${e.message}`;
    });
  </script>
</body>
</html>
